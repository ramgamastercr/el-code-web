<!-- ─────────────── TOP NAVBAR ─────────────── -->
<nav
  class="navbar fixed top-0 left-0 w-full z-[100] transition-all duration-500"
  [class.navbar--scrolled]="isScrolled()"
  role="navigation"
  aria-label="Navegación principal">

  <div class="px-5 md:px-8 lg:px-12">
    <div class="flex items-center justify-between max-w-7xl mx-auto h-16 md:h-20">

      <!-- Logo (left) -->
      <a
        href="#hero"
        (click)="handleNav($event, '#hero')"
        class="nav-logo group flex items-center gap-3 focus-visible:outline-neon"
        aria-label="EL CODE — Ir al inicio">
        <span class="w-2 h-2 rounded-full bg-neon shadow-[0_0_8px_#00FF9C]" aria-hidden="true"></span>
        <img
          src="ELCODELOGO.png"
          alt="EL CODE"
          class="nav-logo-img transition-all duration-500 group-hover:scale-105 group-hover:drop-shadow-[0_0_12px_rgba(0,255,156,0.6)]" />
      </a>

      <!-- Desktop links (right) -->
      <div class="hidden md:flex items-center gap-1 lg:gap-2">
        @for (link of links; track link.target; let i = $index) {
          <a
            [href]="link.target"
            (click)="handleNav($event, link.target)"
            class="nav-link group">
            <span class="nav-link-idx">0{{ i + 1 }}</span>
            <span class="nav-link-label">{{ link.label }}</span>
          </a>
        }

      </div>

      <!-- Mobile hamburger -->
      <button
        class="md:hidden relative w-11 h-11 flex flex-col items-center justify-center gap-[5px] rounded-xl glass-strong border border-white/15 hover:border-neon/50 transition-all duration-300 focus-visible:outline-neon z-[60]"
        [attr.aria-expanded]="isMenuOpen()"
        aria-controls="mobile-menu"
        [attr.aria-label]="isMenuOpen() ? 'Cerrar menú' : 'Abrir menú'"
        (click)="toggleMenu()">
        <span class="hamburger-line" [class.open-1]="isMenuOpen()"></span>
        <span class="hamburger-line" [class.open-2]="isMenuOpen()"></span>
        <span class="hamburger-line" [class.open-3]="isMenuOpen()"></span>
      </button>

    </div>
  </div>

</nav>

<!-- ─────────────── MOBILE OVERLAY ─────────────── -->
<div
  id="mobile-menu"
  class="mobile-overlay fixed inset-0 z-[90] md:hidden bg-black backdrop-blur-2xl"
  [class.mobile-overlay--open]="isMenuOpen()"
  role="dialog"
  aria-modal="true"
  [attr.aria-hidden]="!isMenuOpen()">

  <!-- decorative corner tags -->
  <div class="absolute top-20 left-5 font-orbitron text-[10px] text-neon/30 tracking-[4px]" aria-hidden="true">
    [ NAVIGATION ]
  </div>
  <div class="absolute bottom-24 right-5 font-orbitron text-[10px] text-neon/30 tracking-[4px]" aria-hidden="true">
    EL_CODE / v1.0
  </div>

  <div class="mobile-overlay-content flex flex-col h-full px-6">

    <!-- Big stacked links -->
    <nav class="flex-1 flex flex-col justify-center gap-0" role="menu" aria-label="Menú móvil">
      @for (link of links; track link.target; let i = $index) {
        <a
          [href]="link.target"
          role="menuitem"
          (click)="handleNav($event, link.target)"
          class="mobile-link group flex items-baseline gap-5 py-5 border-b border-white/5">
          <span class="font-orbitron text-[11px] text-neon/60 tracking-[3px] w-8">0{{ i + 1 }}</span>
          <span class="font-orbitron text-[2.25rem] sm:text-[2.75rem] font-bold uppercase tracking-[3px] text-gray-200 group-hover:text-neon group-hover:translate-x-2 transition-all duration-300">
            {{ link.label }}
          </span>
        </a>
      }
    </nav>

    <!-- close hint -->
    <div class="mt-6">
      <p class="text-center font-orbitron text-[10px] text-gray-600 tracking-[4px] uppercase">
        Toca <span class="text-neon">ESC</span> o el menú para cerrar
      </p>
    </div>

  </div>

</div>
